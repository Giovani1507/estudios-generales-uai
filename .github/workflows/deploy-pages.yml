name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      BASE_PATH: /estudios-generales-uai/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build school portal
        working-directory: ./artifacts/school-portal
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts/school-portal/dist/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
